<body class="bg-background text-on-background antialiased md:hidden pb-safe min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-surface-dim docked full-width top-0 border-b border-outline-variant dark:border-outline flat no shadows flex justify-between items-center w-full px-md h-16 sticky z-10">
<div class="flex items-center gap-sm">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low dark:hover:bg-surface-container-high transition-colors Active: opacity-80 scale-95 transition-all duration-150">
<span class="material-symbols-outlined text-on-surface-variant dark:text-outline" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed">Ganti Kata Sandi</h1>
</div>
<div class="w-10 h-10 flex items-center justify-center">
<!-- Empty space for balance if no trailing action -->
</div>
</header>
<!-- Main Content -->
<main class="flex-1 p-margin-horizontal pt-lg flex flex-col gap-xl">
<!-- Security Instruction -->
<section class="bg-surface-container-low p-md rounded-xl border border-outline-variant/30 shadow-sm dark:shadow-none">
<div class="flex items-start gap-sm">
<span class="material-symbols-outlined text-primary mt-xs" data-icon="security">security</span>
<div>
<h2 class="font-label-md text-label-md text-on-surface mb-xs">Persyaratan Kata Sandi</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Kata sandi baru harus terdiri dari minimal 8 karakter, mengandung kombinasi huruf besar, huruf kecil, dan angka untuk keamanan akun Anda.</p>
</div>
</div>
</section>
<!-- Form Form -->
<form class="flex flex-col gap-md flex-1">
<!-- Current Password -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="current_password">Kata Sandi Saat Ini</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-10 pr-10 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="current_password" placeholder="Masukkan kata sandi saat ini" type="password"/>
<button class="absolute right-3 text-outline hover:text-on-surface-variant transition-colors" onclick="togglePasswordVisibility('current_password', 'toggle_current')" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off" id="toggle_current">visibility_off</span>
</button>
</div>
</div>
<!-- New Password -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="new_password">Kata Sandi Baru</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline" data-icon="key">key</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-10 pr-10 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="new_password" placeholder="Masukkan kata sandi baru" type="password"/>
<button class="absolute right-3 text-outline hover:text-on-surface-variant transition-colors" onclick="togglePasswordVisibility('new_password', 'toggle_new')" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off" id="toggle_new">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm New Password -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface" for="confirm_password">Konfirmasi Kata Sandi Baru</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-outline" data-icon="key">key</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg pl-10 pr-10 py-3 font-body-md text-body-md text-on-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors" id="confirm_password" placeholder="Ketik ulang kata sandi baru" type="password"/>
<button class="absolute right-3 text-outline hover:text-on-surface-variant transition-colors" onclick="togglePasswordVisibility('confirm_password', 'toggle_confirm')" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off" id="toggle_confirm">visibility_off</span>
</button>
</div>
</div>
<div class="mt-auto pt-xl pb-20">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-3 rounded-lg shadow-sm hover:bg-primary-container transition-colors min-h-[44px] flex items-center justify-center gap-sm Active: opacity-80 scale-95 transition-all duration-150" type="submit">
<span class="material-symbols-outlined" data-icon="save">save</span>
                    Simpan Perubahan
                </button>
</div>
</form>
</main>
<script>
        function togglePasswordVisibility(inputId, toggleId) {
            const input = document.getElementById(inputId);
            const toggle = document.getElementById(toggleId);
            
            if (input.type === "password") {
                input.type = "text";
                toggle.textContent = "visibility";
                toggle.setAttribute('data-icon', 'visibility');
            } else {
                input.type = "password";
                toggle.textContent = "visibility_off";
                toggle.setAttribute('data-icon', 'visibility_off');
            }
        }
    </script>
</body></html>
