<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WorkPulse HR - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {

            extend: {
              "colors": {
                      "on-primary-fixed-variant": "#173bab",
                      "primary-fixed-dim": "#b8c4ff",
                      "on-error": "#ffffff",
                      "on-tertiary-fixed": "#2a1700",
                      "primary-fixed": "#dde1ff",
                      "on-error-container": "#93000a",
                      "inverse-on-surface": "#eaf1ff",
                      "error": "#ba1a1a",
                      "tertiary-fixed-dim": "#ffb95f",
                      "background": "#f8f9ff",
                      "surface-dim": "#cbdbf5",
                      "on-background": "#0b1c30",
                      "surface-variant": "#d3e4fe",
                      "outline": "#757684",
                      "inverse-surface": "#213145",
                      "tertiary": "#4c2e00",
                      "on-surface": "#0b1c30",
                      "on-primary-container": "#a8b8ff",
                      "secondary-fixed-dim": "#4edea3",
                      "surface-container-lowest": "#ffffff",
                      "on-secondary-fixed-variant": "#005236",
                      "surface-container": "#e5eeff",
                      "inverse-primary": "#b8c4ff",
                      "secondary": "#006c49",
                      "surface-container-low": "#eff4ff",
                      "surface": "#f8f9ff",
                      "primary": "#00288e",
                      "on-tertiary": "#ffffff",
                      "tertiary-container": "#6b4200",
                      "on-secondary": "#ffffff",
                      "secondary-container": "#6cf8bb",
                      "error-container": "#ffdad6",
                      "tertiary-fixed": "#ffddb8",
                      "outline-variant": "#c4c5d5",
                      "on-tertiary-container": "#ffa929",
                      "on-secondary-fixed": "#002113",
                      "on-secondary-container": "#00714d",
                      "secondary-fixed": "#6ffbbe",
                      "on-primary-fixed": "#001453",
                      "primary-container": "#1e40af",
                      "surface-tint": "#3755c3",
                      "on-primary": "#ffffff",
                      "on-surface-variant": "#444653",
                      "surface-container-highest": "#d3e4fe",
                      "surface-bright": "#f8f9ff",
                      "surface-container-high": "#dce9ff",
                      "on-tertiary-fixed-variant": "#653e00"
              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "base": "4px",
                      "xs": "4px",
                      "sm": "8px",
                      "lg": "24px",
                      "margin-horizontal": "16px",
                      "xl": "32px",
                      "md": "16px",
                      "gutter": "12px"
              },
              "fontFamily": {
                      "headline-md": ["Inter"],
                      "label-sm": ["Inter"],
                      "body-lg": ["Inter"],
                      "headline-lg": ["Inter"],
                      "label-md": ["Inter"],
                      "headline-lg-mobile": ["Inter"],
                      "body-md": ["Inter"]
              },
              "fontSize": {
                      "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                      "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "500"}],

                      "headline-lg": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],

          }
        }

<style>
        /* Minimal custom CSS for overrides if needed, relying mostly on Tailwind */
        body {
            -webkit-tap-highlight-color: transparent;
        }
        .bg-pattern {
            background-image: radial-gradient(circle at 100% 0%, var(--tw-gradient-stops));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col font-body-md text-body-md text-on-background relative overflow-hidden">
<!-- Ambient Background Decor (Subtle Corporate Blue Gradient) -->
<div class="absolute top-0 right-0 w-full h-64 bg-gradient-to-bl from-primary-fixed to-transparent opacity-50 pointer-events-none"></div>
<!-- Main Content Container -->
<main class="flex-1 flex flex-col justify-center px-margin-horizontal w-full max-w-md mx-auto z-10 py-xl relative">
<!-- Header Section -->
<header class="flex flex-col items-center mb-xl">
<!-- Brand Logo Placeholder -->
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center shadow-sm mb-lg">
<span class="material-symbols-outlined text-[32px] text-on-primary" style="font-variation-settings: 'FILL' 1;">domain</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-background text-center">
                Selamat Datang di WorkPulse HR
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center mt-sm">
                Silakan masuk dengan kredensial Anda.
            </p>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<!-- Email/Username Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-background" for="username">Email / Username</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant">person</span>
<input class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-lg pl-xl pr-md py-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline" id="username" placeholder="Masukkan email atau username" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-background" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline-variant">lock</span>
<input class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-lg pl-xl pr-xl py-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface placeholder:text-outline" id="password" placeholder="Masukkan password Anda" type="password"/>
<button class="absolute right-sm top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors p-sm flex items-center justify-center" id="togglePassword" type="button">
<span class="material-symbols-outlined" id="toggleIcon">visibility_off</span>
</button>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end mt-xs">
<a class="font-label-md text-label-md text-primary hover:underline" href="#">Lupa Password?</a>
</div>
<!-- Primary Login Button -->
<button class="w-full h-12 mt-lg bg-primary text-on-primary font-label-md text-label-md rounded-lg flex justify-center items-center gap-sm active:scale-[0.98] transition-transform shadow-sm hover:opacity-90" type="submit">
                Masuk
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center my-lg">
<div class="flex-grow border-t border-outline-variant opacity-50"></div>
<span class="px-md font-label-sm text-label-sm text-on-surface-variant">ATAU</span>
<div class="flex-grow border-t border-outline-variant opacity-50"></div>
</div>
<!-- Biometric Login Option -->
<button class="w-full h-12 border border-primary text-primary bg-transparent font-label-md text-label-md rounded-lg flex justify-center items-center gap-sm active:scale-[0.98] transition-transform hover:bg-surface-container-low" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">fingerprint</span>
            Masuk dengan Biometrik
        </button>
</main>
<!-- Footer -->
<footer class="w-full py-lg flex justify-center items-center mt-auto">
<span class="font-label-sm text-label-sm text-on-surface-variant">Versi 2.1.0</span>
</footer>
<script>
        // Password Visibility Toggle Logic
        const passwordInput = document.getElementById('password');
        const toggleButton = document.getElementById('togglePassword');
        const toggleIcon = document.getElementById('toggleIcon');

        toggleButton.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggleIcon.textContent = type === 'password' ? 'visibility_off' : 'visibility';
        });
    </script>
</body></html>
