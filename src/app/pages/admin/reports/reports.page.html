<ion-content>
  <header class="top-app-bar">
    <div class="top-bar-left">
      <button class="back-btn" (click)="goBack()">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <h1 class="top-app-bar-title">Laporan</h1>
    </div>
    <div style="width:40px"></div>
  </header>

  <div class="page-wrap">
    <div class="loading-indicator" *ngIf="loading">
      <p>Memuat data...</p>
    </div>

    <ng-container *ngIf="!loading">
      <div class="section">
        <h3>Generate Laporan</h3>
        <div class="export-list">
          <div class="export-item" *ngFor="let report of reportTypes" (click)="generateReport(report)">
            <span class="material-symbols-outlined" style="font-size:22px;color:var(--ion-color-primary);flex-shrink:0">{{ getReportIcon(report.id) }}</span>
            <div class="ei-text">
              <span>{{ report.title }}</span>
              <span>{{ report.description }}</span>
            </div>
            <span class="material-symbols-outlined" style="font-size:20px;color:var(--outline-variant);flex-shrink:0" *ngIf="generating && generatingReport === report.id">sync</span>
            <span class="material-symbols-outlined" style="font-size:20px;color:var(--outline-variant);flex-shrink:0" *ngIf="!(generating && generatingReport === report.id)">download</span>
          </div>
        </div>
      </div>
    </ng-container>
  </div>

  <nav class="bottom-nav">
    <a class="bottom-nav-item" (click)="navigateTo('/admin/dashboard')">
      <span class="material-symbols-outlined">dashboard</span>
      <span class="nav-label">Dashboard</span>
    </a>
    <a class="bottom-nav-item" (click)="navigateTo('/admin/employees')">
      <span class="material-symbols-outlined">group</span>
      <span class="nav-label">Karyawan</span>
    </a>
    <a class="bottom-nav-item" (click)="navigateTo('/admin/attendance-monitor')">
      <span class="material-symbols-outlined">event_available</span>
      <span class="nav-label">Absensi</span>
    </a>
    <a class="bottom-nav-item" (click)="navigateTo('/admin/leave-management')">
      <span class="material-symbols-outlined">event_busy</span>
      <span class="nav-label">Cuti</span>
    </a>
    <a class="bottom-nav-item" (click)="navigateTo('/admin/payroll-management')">
      <span class="material-symbols-outlined">payments</span>
      <span class="nav-label">Payroll</span>
    </a>
  </nav>
</ion-content>
