<nav class="manager-nav-shell" aria-label="Manager bottom navigation">
  <button
    type="button"
    class="manager-nav-item"
    *ngFor="let item of navItems"
    [class.active]="active === item.key"
    (click)="goTo(item.route)"
  >
    <span class="manager-nav-icon" [ngSwitch]="item.icon">
      <svg *ngSwitchCase="'overview'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 5.5C4 4.67 4.67 4 5.5 4H10V10H4V5.5Z" stroke="currentColor" stroke-width="1.85" stroke-linejoin="round" />
        <path d="M14 4H18.5C19.33 4 20 4.67 20 5.5V10H14V4Z" stroke="currentColor" stroke-width="1.85" stroke-linejoin="round" />
        <path d="M4 14H10V20H5.5C4.67 20 4 19.33 4 18.5V14Z" stroke="currentColor" stroke-width="1.85" stroke-linejoin="round" />
        <path d="M14 14H20V18.5C20 19.33 19.33 20 18.5 20H14V14Z" stroke="currentColor" stroke-width="1.85" stroke-linejoin="round" />
      </svg>

      <svg *ngSwitchCase="'team'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12Z" stroke="currentColor" stroke-width="1.85" />
        <path d="M4.5 20C5.38 16.93 8.43 15 12 15C15.57 15 18.62 16.93 19.5 20" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" />
        <path d="M18 11C19.66 11 21 9.88 21 8.5C21 7.12 19.66 6 18 6" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" />
      </svg>

      <svg *ngSwitchCase="'attendance'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M7 3V6M17 3V6M4 9H20" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" />
        <path d="M5 5H19V20H5V5Z" stroke="currentColor" stroke-width="1.85" stroke-linejoin="round" />
        <path d="M9 14L11 16L15 12" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" stroke-linejoin="round" />
      </svg>

      <svg *ngSwitchCase="'approval'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M8 4H16L19 7V20H5V7L8 4Z" stroke="currentColor" stroke-width="1.85" stroke-linejoin="round" />
        <path d="M9 13L11 15L15.5 10.5" stroke="currentColor" stroke-width="1.95" stroke-linecap="round" stroke-linejoin="round" />
      </svg>

      <svg *ngSwitchCase="'profile'" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M20 21C20 17.7 16.4 15 12 15C7.6 15 4 17.7 4 21" stroke="currentColor" stroke-width="1.85" stroke-linecap="round" />
        <path d="M12 12C14.2 12 16 10.2 16 8C16 5.8 14.2 4 12 4C9.8 4 8 5.8 8 8C8 10.2 9.8 12 12 12Z" stroke="currentColor" stroke-width="1.85" />
      </svg>
    </span>

    <span class="manager-nav-label">{{ item.label }}</span>
  </button>
</nav>
